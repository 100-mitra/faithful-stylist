name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      # No secrets: tests use the deterministic fake provider and never hit the network.
      STYLIST_LLM: fake
      STYLIST_EMBEDDER: hashing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .

      - name: Pytest
        run: pytest
